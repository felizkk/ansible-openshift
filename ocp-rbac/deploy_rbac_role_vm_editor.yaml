    #       metadata:
    #         name: "{{ role_name }}-project-view"
    #         namespace: "{{ namespace_name }}"
    #       subjects:
    #         - kind: Group
    #           apiGroup: rbac.authorization.k8s.io
    #           name: "{{ user_group_name }}"
    #       roleRef:
    #         apiGroup: rbac.authorization.k8s.io
    #         kind: ClusterRole
    #         name: view

    # Allows Editing a VM
    # - name: Create RoleBinding for KubeVirt.io API - Edit
    #   redhat.openshift.k8s:
    #     state: present
    #     definition:
    #       kind: RoleBinding
    #       apiVersion: rbac.authorization.k8s.io/v1
    #       metadata:
    #         name: "{{ role_name }}-kubevirtio-edit"
    #         namespace: "{{ namespace_name }}"
    #       subjects:
    #         - kind: Group
    #           apiGroup: rbac.authorization.k8s.io
    #           name: "{{ user_group_name }}"
    #       roleRef:
    #         apiGroup: rbac.authorization.k8s.io
    #         kind: ClusterRole
