---
- name: Test AAP to OCP Playbook
  hosts: localhost
  gather_facts: false

  vars:
    role_name: vm-editor-group
    namespace_name: vm-test-project-1
    user_group_name: vm-editor-group
  
  tasks:
    # Allows edit of Project resources
    # Just view is not enough. It will not allow processedTemplate for VM Creation
    - name: Create RoleBinding for Project Namespace - Edit
      redhat.openshift.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: "{{ role_name }}-project-edit"
            namespace: "{{ namespace_name }}"
          subjects:
            - kind: Group
              apiGroup: rbac.authorization.k8s.io
              name: "{{ user_group_name }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: edit

    # Allows View of Project resources
    # Just view is not enough. It will not allow processedTemplate for VM Creation
