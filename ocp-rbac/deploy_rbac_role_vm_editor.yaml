    # Edit control over CDI resources on Namespace. 
    # Manage DataVolumes, DataSources, and DataImportCrons for VM disk lifecycle — cloning, importing, uploading images.
    # - name: Create RoleBinding for CDI KubeVirt.io API - Edit
