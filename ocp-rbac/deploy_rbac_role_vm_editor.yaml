    #         name: cdi.kubevirt.io:edit

    # Allows listing DataSources / PVCs (boot sources) in that namespace
    - name: Create RoleBinding for OS Images - View
      redhat.openshift.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: "{{ role_name }}-os-images-view"
            namespace: openshift-virtualization-os-images
          subjects:
            - kind: Group
              apiGroup: rbac.authorization.k8s.io
              name: "{{ user_group_name }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: view

    - name: Create RoleBinding for Monitoring Rules - View
      redhat.openshift.k8s:
        state: present
        definition:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          metadata:
            name: "{{ role_name }}-monitoring-rules-view"
            namespace: "{{ namespace_name }}"
          subjects:
