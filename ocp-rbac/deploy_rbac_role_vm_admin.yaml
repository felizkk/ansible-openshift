---
- name: Test AAP to OCP Playbook
  hosts: localhost
  gather_facts: false

  vars:
    role_name: vm-admin-group
    namespace_name: vm-test-project-1
    user_group_name: vm-admin-group
  
  tasks:
    # Allows creating new VM
    - name: Create RoleBinding for KubeVirt.io API - Admin
      redhat.openshift.k8s:
        state: present
        definition:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          metadata:
            name: "{{ role_name }}-kubevirtio-admin"
            namespace: "{{ namespace_name }}"
          subjects:
            - kind: Group
              apiGroup: rbac.authorization.k8s.io
              name: "{{ user_group_name }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: kubevirt.io:admin

    # Admin control over CDI resources on Namespace. 
    # Manage DataVolumes, DataSources, and DataImportCrons for VM disk lifecycle — cloning, importing, uploading images.
    - name: Create RoleBinding for CDI KubeVirt.io API - Admin
      redhat.openshift.k8s:
        state: present
        definition:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          metadata:
            name: "{{ role_name }}-cdikubevirtio-admin"
            namespace: "{{ namespace_name }}"
          subjects:
            - kind: Group
              apiGroup: rbac.authorization.k8s.io
              name: "{{ user_group_name }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cdi.kubevirt.io:admin

    # Admin control over OS Image Templates resources on Namespace. 
    # - name: Create RoleBinding for Templates API - Admin
    #   redhat.openshift.k8s:
    #     state: present
    #     definition:
    #       kind: RoleBinding
    #       apiVersion: rbac.authorization.k8s.io/v1
    #       metadata:
    #         name: "{{ role_name }}-template-admin"
    #         namespace: "{{ namespace_name }}"
    #       subjects:
    #         - kind: Group
    #           apiGroup: rbac.authorization.k8s.io
    #           name: "{{ user_group_name }}"
    #       roleRef:
    #         apiGroup: rbac.authorization.k8s.io
    #         kind: ClusterRole
    #         name: template.openshift.io:admin

    # Allows admin of Project resources
    # Just view is not enough. It will not allow processedTemplate for VM Creation
    - name: Create RoleBinding for Project Namespace - View
      redhat.openshift.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: "{{ role_name }}-project-view"
            namespace: "{{ namespace_name }}"
          subjects:
            - kind: Group
              apiGroup: rbac.authorization.k8s.io
              name: "{{ user_group_name }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: view
    
    # Allows listing DataSources / PVCs (boot sources) in that namespace
    - name: Create RoleBinding for OS Images - View
      redhat.openshift.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: "{{ role_name }}-os-images-view"
            namespace: openshift-virtualization-os-images
          subjects:
            - kind: Group
              apiGroup: rbac.authorization.k8s.io
              name: "{{ user_group_name }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: view

    # Allows get/list and on processedtemplates
    # Not needed for VM Creation via Catalog Template
    # - name: Create RoleBinding for OS Images Template - View
    #   redhat.openshift.k8s:
    #     state: present
    #     definition:
    #       apiVersion: rbac.authorization.k8s.io/v1
    #       kind: RoleBinding
    #       metadata:
    #         name: "{{ role_name }}-os-images-template-view"
    #         namespace: openshift-virtualization-os-images
    #       subjects:
    #         - kind: Group
    #           apiGroup: rbac.authorization.k8s.io
    #           name: "{{ user_group_name }}"
    #       roleRef:
    #         apiGroup: rbac.authorization.k8s.io
    #         kind: ClusterRole
    #         name: template.openshift.io:view
