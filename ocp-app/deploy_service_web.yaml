---
- name: Test AAP to OCP Playbook
  hosts: localhost

  vars:
    namespace_name: foobar
    service_name: web
    app_name: galaxy

  tasks:
    - name: Create a Service object from an inline definition
      redhat.openshift.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ service_name }}"
            namespace: "{{ namespace_name }}"
            labels:
              app: "{{ app_name }}"
              service: "{{ service_name }}"
          spec:
            selector:
              app: "{{ app_name }}"
              service: "{{ service_name }}"
            ports:
              - protocol: TCP
                targetPort: 8000
                name: port-8000-tcp
                port: 8000
